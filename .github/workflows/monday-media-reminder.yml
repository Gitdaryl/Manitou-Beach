name: Monday Media Reminder

on:
  schedule:
    # Every Monday 9am ET = 1pm UTC
    - cron: '7 13 * * 1'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📸 Thursday Roundup - add background images (week of ${today})`,
              body: `The Thursday video roundup renders **Wednesday night**. Right now only \`bg.jpg\` (the landlakes aerial) is in rotation.\n\n## What to do\n\nDrop new images into \`video-templates/thursday-slideshow/assets/\` as:\n- \`bg2.jpg\`\n- \`bg3.jpg\`\n- \`bg4.jpg\`\n\nThey rotate automatically each week - no code changes needed.\n\n## Good candidates\n- Aerial lake / community shots\n- Seasonal scenery (beach, fall color, snow on the dock)\n- Event crowd photos\n- Any hero image already in \`public/images/\`\n\nOnce added, commit + push and the pipeline picks them up automatically next Wednesday night.`,
            });
