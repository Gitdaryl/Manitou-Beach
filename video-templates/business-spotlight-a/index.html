<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1080, height=1920"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Libre+Franklin:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0A1218; }
    .clip { visibility: hidden; }
  </style>
</head>
<body>
<div id="root"
  data-composition-id="main"
  data-start="0"
  data-duration="14"
  data-width="1080"
  data-height="1920">

  <!-- Background: scenic MB lake photo -->
  <div id="bg" class="clip"
    data-start="0" data-duration="14" data-track-index="0"
    style="position:absolute;top:0;left:0;width:1080px;height:1920px;overflow:hidden;opacity:1;">
    <img src="assets/bg.jpg"
      style="width:1080px;height:1920px;object-fit:cover;object-position:center 35%;" alt=""/>
  </div>

  <!-- Cinematic vignette overlay -->
  <div id="bg-overlay" class="clip"
    data-start="0" data-duration="14" data-track-index="1"
    style="position:absolute;top:0;left:0;width:1080px;height:1920px;
    background:linear-gradient(180deg,
      rgba(10,18,24,0.88) 0%,
      rgba(10,18,24,0.40) 28%,
      rgba(10,18,24,0.40) 64%,
      rgba(10,18,24,0.92) 100%);
    opacity:1;"></div>

  <!-- Header: persistent MB brand bar -->
  <div id="header" class="clip"
    data-start="0" data-duration="14" data-track-index="2"
    style="position:absolute;top:64px;left:0;right:0;
    display:flex;align-items:center;padding:0 54px;gap:24px;opacity:0;">
    <img src="assets/mb-icon.png"
      style="width:84px;height:84px;border-radius:50%;object-fit:cover;
      border:2px solid rgba(250,246,239,0.25);box-shadow:0 4px 20px rgba(0,0,0,0.5);flex-shrink:0;"/>
    <div>
      <div style="font-family:'Libre Franklin',sans-serif;font-size:40px;font-weight:800;
      color:#FAF6EF;letter-spacing:1px;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,0.5);">MANITOU BEACH</div>
      <div style="font-family:'Libre Franklin',sans-serif;font-size:28px;font-weight:600;
      color:#D4845A;letter-spacing:4px;line-height:1;margin-top:4px;">MICHIGAN</div>
    </div>
    <div style="margin-left:auto;background:rgba(212,132,90,0.88);border-radius:30px;
    padding:14px 30px;box-shadow:0 4px 20px rgba(212,132,90,0.4);">
      <span style="font-family:'Libre Franklin',sans-serif;font-size:26px;font-weight:800;
      color:#FAF6EF;letter-spacing:3px;">LOCAL GEM</span>
    </div>
  </div>

  <!-- ACT 1: "A LOCAL GEM." intro (0.4 - 3.2s) -->
  <div id="act1" class="clip"
    data-start="0" data-duration="14" data-track-index="3"
    style="position:absolute;top:0;left:0;width:1080px;height:1920px;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 60px;opacity:0;">
    <div style="font-family:'Libre Franklin',sans-serif;font-size:26px;font-weight:600;
    color:#D4845A;letter-spacing:7px;text-transform:uppercase;margin-bottom:24px;
    text-shadow:0 2px 10px rgba(0,0,0,0.5);">COMMUNITY GUIDE</div>
    <div style="font-family:'Libre Baskerville',serif;font-size:152px;font-weight:700;
    color:#FAF6EF;line-height:0.86;letter-spacing:-5px;
    text-shadow:0 6px 40px rgba(0,0,0,0.55);">A LOCAL</div>
    <div style="font-family:'Libre Baskerville',serif;font-size:152px;font-weight:700;
    font-style:italic;color:#D4845A;line-height:0.86;letter-spacing:-5px;margin-top:14px;
    text-shadow:0 6px 40px rgba(0,0,0,0.4);">GEM.</div>
    <div style="margin-top:60px;display:flex;align-items:center;gap:18px;">
      <div style="width:52px;height:2px;background:#5B7E95;flex-shrink:0;"></div>
      <span style="font-family:'Libre Franklin',sans-serif;font-size:28px;font-weight:400;
      color:rgba(250,246,239,0.65);letter-spacing:3px;
      text-shadow:0 2px 10px rgba(0,0,0,0.4);">MANITOU BEACH, MICHIGAN</span>
    </div>
  </div>

  <!-- ACT 2: Business card - logo + name + category (3.6 - 8.6s) -->
  <div id="act2" class="clip"
    data-start="0" data-duration="14" data-track-index="4"
    style="position:absolute;top:220px;left:60px;right:60px;bottom:160px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;opacity:0;">

    <!-- Logo ring -->
    <div id="logo-ring" style="position:relative;width:280px;height:280px;margin-bottom:44px;flex-shrink:0;">
      <div style="position:absolute;inset:-10px;border-radius:50%;
      background:conic-gradient(#D4845A 0%, #5B7E95 33%, #7A8E72 66%, #D4845A 100%);
      opacity:0.75;filter:blur(5px);"></div>
      <div style="position:absolute;inset:-2px;border-radius:50%;
      background:rgba(250,246,239,0.12);"></div>
      <!-- LOGO: swap this img for the actual logo URL when available.
           Falls back to the initial-letter placeholder below. -->
      <div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;
      background:rgba(10,18,24,0.88);border:2px solid rgba(250,246,239,0.18);">
        <!-- PLACEHOLDER: replace with <img src="LOGO_URL" style="width:100%;height:100%;object-fit:cover;"/> when logo exists -->
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;
        background:linear-gradient(135deg,rgba(91,126,149,0.35),rgba(212,132,90,0.22));">
          <span style="font-family:'Libre Baskerville',serif;font-size:108px;font-weight:700;
          color:#FAF6EF;text-shadow:0 4px 20px rgba(0,0,0,0.5);">T</span>
        </div>
      </div>
    </div>

    <!-- Business name -->
    <div style="font-family:'Libre Baskerville',serif;font-size:90px;font-weight:700;
    color:#FAF6EF;text-align:center;line-height:1.0;letter-spacing:-2px;
    text-shadow:0 4px 28px rgba(0,0,0,0.6);margin-bottom:28px;">Two Lakes Tavern</div>

    <!-- Category pill -->
    <div style="background:rgba(91,126,149,0.22);border:1.5px solid rgba(91,126,149,0.55);
    border-radius:100px;padding:13px 38px;">
      <span style="font-family:'Libre Franklin',sans-serif;font-size:28px;font-weight:700;
      color:#5B7E95;letter-spacing:4px;text-transform:uppercase;">Bar &amp; Grill</span>
    </div>
  </div>

  <!-- ACT 3: Tagline (8.9 - 12.0s) -->
  <div id="act3" class="clip"
    data-start="0" data-duration="14" data-track-index="5"
    style="position:absolute;top:0;left:0;width:1080px;height:1920px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 88px;opacity:0;">
    <div style="width:56px;height:3px;background:#D4845A;margin-bottom:56px;
    box-shadow:0 2px 20px rgba(212,132,90,0.55);"></div>
    <div style="font-family:'Libre Baskerville',serif;font-size:70px;font-weight:400;
    font-style:italic;color:#FAF6EF;text-align:center;line-height:1.35;
    text-shadow:0 4px 28px rgba(0,0,0,0.55);">
      "Cold drinks, live music, and good vibes - right on the lake."
    </div>
    <div style="width:56px;height:3px;background:#D4845A;margin-top:56px;
    box-shadow:0 2px 20px rgba(212,132,90,0.55);"></div>
  </div>

  <!-- ACT 4: CTA (12.3 - 14s) -->
  <div id="act4" class="clip"
    data-start="0" data-duration="14" data-track-index="6"
    style="position:absolute;top:0;left:0;width:1080px;height:1920px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 64px;gap:32px;opacity:0;">
    <div style="font-family:'Libre Franklin',sans-serif;font-size:30px;font-weight:700;
    color:rgba(250,246,239,0.55);letter-spacing:5px;text-transform:uppercase;
    text-align:center;">Find them on the guide</div>
    <div style="background:rgba(10,18,24,0.78);backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);border:1px solid rgba(250,246,239,0.14);
    border-radius:24px;padding:42px 60px;text-align:center;width:100%;">
      <div style="font-family:'Libre Franklin',sans-serif;font-size:40px;font-weight:700;
      color:#FAF6EF;line-height:1.2;">
        manitoubeachmichigan.com<span style="color:#D4845A;">/businesses</span>
      </div>
    </div>
    <div style="font-family:'Libre Baskerville',serif;font-size:36px;font-style:italic;
    color:rgba(250,246,239,0.42);text-align:center;">
      Your community guide to Manitou Beach
    </div>
  </div>
</div>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });

tl.set("#bg",         { visibility: "visible" });
tl.set("#bg-overlay", { visibility: "visible" });

// Header slides down
tl.set("#header", { visibility: "visible" });
tl.fromTo("#header", { opacity: 0, y: -24 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.2);

// ACT 1: editorial intro
tl.set("#act1", { visibility: "visible" });
tl.fromTo("#act1", { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.75, ease: "power3.out" }, 0.4);
tl.to("#act1", { opacity: 0, y: -40, duration: 0.45, ease: "power2.in" }, 3.2);

// ACT 2: business card scales in
tl.set("#act2", { visibility: "visible" });
tl.fromTo("#act2", { opacity: 0, scale: 0.90, y: 50 }, { opacity: 1, scale: 1, y: 0, duration: 0.75, ease: "back.out(1.6)" }, 3.65);
// Logo ring breathes gently
tl.to("#logo-ring", { scale: 1.05, duration: 0.95, ease: "sine.inOut", yoyo: true, repeat: 2 }, 4.55);
tl.to("#act2", { opacity: 0, y: -36, duration: 0.42, ease: "power2.in" }, 8.55);

// ACT 3: tagline drifts up
tl.set("#act3", { visibility: "visible" });
tl.fromTo("#act3", { opacity: 0, y: 55 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 8.95);
tl.to("#act3", { opacity: 0, duration: 0.45, ease: "power1.in" }, 12.0);

// ACT 4: CTA
tl.set("#act4", { visibility: "visible" });
tl.fromTo("#act4", { opacity: 0, y: 44 }, { opacity: 1, y: 0, duration: 0.65, ease: "back.out(1.4)" }, 12.35);
tl.to("#act4", { scale: 1.013, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 13.15);

window.__timelines["main"] = tl;
</script>
</body>
</html>
